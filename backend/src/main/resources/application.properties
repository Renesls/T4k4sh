spring.application.name=t4kash-api
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/t4kash}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:t4kash}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:t4kash}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

logging.level.root=INFO
logging.level.com.t4kash.api=DEBUG
